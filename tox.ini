[tox]
envlist =
    py310
    py311
    py312
    py313
    lint
    typecheck
isolated_build = true

# ── Test environments ──────────────────────────────────────────────────────────
[testenv]
deps =
    pytest>=8.0
    pytest-cov>=4.0
commands =
    pytest --cov=braphin --cov-report=term-missing {posargs}

# ── Lint environment ───────────────────────────────────────────────────────────
[testenv:lint]
skip_install = true
deps = ruff
commands =
    ruff check braphin/
    ruff format --check braphin/

# ── Type check environment ─────────────────────────────────────────────────────
[testenv:typecheck]
deps =
    mypy
    nibabel
    numpy
commands =
    mypy braphin/ --ignore-missing-imports

# ── Coverage-only environment (for CI badge generation) ───────────────────────
[testenv:coverage]
deps =
    pytest>=8.0
    pytest-cov>=4.0
commands =
    pytest --cov=braphin --cov-report=xml --cov-report=html {posargs}
